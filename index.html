<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxed-UBG | Unblocked Lessons</title>
  </head>
  <style>
    :root { background-color: #020617; color: #f8fafc; }
    html, body { background: #020617; margin: 0; padding: 0; height: 100%; width: 100%; color: #f8fafc; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <body style="background-color: #020617; margin: 0; color: #f8fafc; font-family: sans-serif;">
    <div id="root"></div>
    
    <!-- Fallback Splash for slow loads -->
    <div id="simple-splash" style="position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="background: #38bdf8; width: 48px; height: 48px; border-radius: 12px; margin-bottom: 16px; animate: pulse 2s infinite;"></div>
      <h1 style="font-size: 18px; font-weight: 700; margin: 0;">MAXED<span style="color: #38bdf8;">-UBG</span></h1>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Remove splash when React is actually ready
      const checkActive = setInterval(() => {
        if (document.getElementById('mount-test')) {
          const splash = document.getElementById('simple-splash');
          if (splash) splash.remove();
          clearInterval(checkActive);
        }
      }, 100);
      
      // Safety timeout
      setTimeout(() => {
        const splash = document.getElementById('simple-splash');
        if (splash) splash.remove();
      }, 5000);
    </script>
  </body>
</html>
