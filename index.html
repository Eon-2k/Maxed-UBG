<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxed-UBG | Unblocked Games</title>
  </head>
  <style>
    :root { background-color: #020617; color: #f8fafc; }
    html, body { background: #020617; margin: 0; padding: 0; height: 100%; width: 100%; color: #f8fafc; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <body style="background-color: #020617; margin: 0;">
    <div id="splash-screen" style="position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease-out; font-family: sans-serif;">
      <div style="background: #38bdf8; width: 64px; height: 64px; margin-bottom: 24px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); border-radius: 12px;"></div>
      <h1 style="color: #f8fafc; font-size: 24px; font-weight: 800; letter-spacing: -1px; margin: 0;">MAXED<span style="color: #38bdf8;">-UBG</span></h1>
      <p style="color: #94a3b8; font-size: 12px; margin-top: 12px; text-transform: uppercase; letter-spacing: 2px;">Initializing Secure Pipeline...</p>
      <button id="enter-btn" style="margin-top: 40px; background: #38bdf8; color: #020617; border: none; padding: 12px 32px; border-radius: 8px; font-weight: 700; cursor: pointer; display: none;">ENTER HUB</button>
      <div id="loading-spinner" style="margin-top: 40px; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="root"></div>
    <div id="error-display" style="display:none; position:fixed; inset:0; background:#7f1d1d; color:white; padding:40px; z-index:10000; overflow:auto; font-family:monospace;">
      <h1 style="font-size:24px; margin-bottom:20px;">SYSTEM CRITICAL ERROR</h1>
      <pre id="error-stack"></pre>
      <button onclick="location.reload()" style="margin-top:20px; background:white; color:#7f1d1d; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">REBOOT SYSTEM</button>
    </div>

    <script type="module" src="src/main.jsx"></script>

    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        const stack = document.getElementById('error-stack');
        display.style.display = 'block';
        stack.innerText = `Message: ${msg}\nUrl: ${url}\nLine: ${lineNo}\nColumn: ${columnNo}\n\nStack Trace:\n${error ? error.stack : 'No stack available'}`;
        return false;
      };

      window.addEventListener('unhandledrejection', function(event) {
        const display = document.getElementById('error-display');
        const stack = document.getElementById('error-stack');
        display.style.display = 'block';
        stack.innerText = `Unhandled Promise Rejection:\n${event.reason}`;
      });

      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        const spinner = document.getElementById('loading-spinner');
        const btn = document.getElementById('enter-btn');
        
        // Simulating a slightly longer initialization for that "secure portal" feel
        setTimeout(() => {
          spinner.style.display = 'none';
          btn.style.display = 'block';
          
          btn.onclick = () => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          };
        }, 1500);
      });
    </script>
  </body>
</html>
